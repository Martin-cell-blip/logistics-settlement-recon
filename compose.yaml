services:
  review-api:
    build: .
    command: >
      sh -c "python src/fetch_olist.py &&
             python src/generate_data.py &&
             python src/run_pipeline.py &&
             python src/audit_agent.py --top 25 &&
             uvicorn src.copilot_api:app --host 0.0.0.0 --port 8000"
    environment:
      REVIEW_API_KEYS: ${REVIEW_API_KEYS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COPILOT_ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  review-ui:
    image: python:3.12-slim
    command: python -m http.server 8080 -d /site
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/site:ro
    depends_on:
      review-api:
        condition: service_healthy
