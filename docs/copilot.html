<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="可输入模拟数据的物流结算异常识别、合同证据回溯与人工复核演示。">
  <title>物流结算异常复核｜交互演示</title>
  <style>
    :root { --ink:#102522; --muted:#536663; --paper:#f4f7f6; --line:#cbd8d5; --panel:#ffffff; --teal:#08695d; --mint:#d7e9e4; --orange:#c95d32; --red:#a92f28; --gold:#edbd43; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:var(--paper); font:14px/1.55 "Segoe UI","Microsoft YaHei","PingFang SC",sans-serif; }
    .topbar { min-height:116px; display:flex; justify-content:space-between; align-items:flex-end; gap:22px; padding:27px 4.5vw 23px; color:#f8fbfa; background:var(--ink); border-bottom:5px solid var(--gold); }
    .context-line { margin:0 0 5px; color:#a6d3c8; font-size:12px; }
    h1 { margin:0; font:800 clamp(28px,4vw,48px)/1.02 "Segoe UI","Microsoft YaHei","PingFang SC",sans-serif; letter-spacing:-.03em; text-wrap:balance; }
    .top-actions { display:grid; justify-items:end; gap:9px; max-width:450px; }
    .mode { padding:9px 11px; border:1px solid #55736c; color:#d7e7dd; font-size:12px; }
    .top-links { display:flex; flex-wrap:wrap; justify-content:flex-end; gap:14px; }
    .top-links a { color:#fff; font-size:12px; font-weight:650; text-underline-offset:4px; }
    main { display:grid; grid-template-columns:minmax(280px, .83fr) minmax(500px, 1.7fr); min-height:calc(100vh - 122px); }
    aside { border-right:1px solid var(--line); padding:26px 20px; background:#e8efed; }
    .meta { display:flex; justify-content:space-between; align-items:center; gap:8px; color:var(--muted); font-size:12px; margin-bottom:18px; }
    .filters { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:18px; }
    button { min-height:44px; font:inherit; cursor:pointer; }
    button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible { outline:3px solid var(--gold); outline-offset:2px; }
    .filter { padding:8px 11px; border:1px solid var(--line); background:transparent; color:var(--muted); }
    .filter.active { color:#fff; background:var(--teal); border-color:var(--teal); }
    .case { width:100%; text-align:left; padding:15px 12px; border:1px solid var(--line); border-bottom:none; background:var(--panel); transition:.18s ease; }
    .case:last-child { border-bottom:1px solid var(--line); }
    .case:hover,.case.active { background:#eef6f3; border-color:#6e958c; box-shadow:inset 0 0 0 1px #6e958c; }
    .case-head,.case-foot { display:flex; justify-content:space-between; gap:8px; }
    .case-head { font-weight:600; } .case-foot { margin-top:8px; color:var(--muted); font-size:12px; }
    .pill { display:inline-block; padding:2px 6px; color:#fff; background:var(--orange); font-size:11px; line-height:1.3; }
    .pill.p2 { background:var(--teal); } .pill.p3 { background:#7b847e; }
    .case-builder { margin:0 0 18px; border:1px solid #89a79f; background:#f9fcfb; }
    .case-builder summary { display:flex; justify-content:space-between; gap:12px; padding:13px; color:var(--teal); font-weight:700; cursor:pointer; list-style:none; }
    .case-builder summary::-webkit-details-marker { display:none; }
    .case-builder summary::after { content:"展开"; color:var(--muted); font-size:12px; font-weight:500; }
    .case-builder[open] summary::after { content:"收起"; }
    .builder-form { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 13px 14px; border-top:1px solid var(--line); }
    .builder-form label { display:grid; gap:5px; padding-top:12px; color:var(--muted); font-size:12px; }
    .builder-form .wide { grid-column:1/-1; }
    .builder-presets { display:flex; flex-wrap:wrap; gap:7px; grid-column:1/-1; padding-top:12px; }
    .builder-presets button { min-height:36px; padding:6px 9px; border:1px solid var(--line); color:var(--teal); background:#fff; }
    .builder-presets button:hover { border-color:var(--teal); }
    .builder-actions { display:flex; flex-wrap:wrap; gap:8px; grid-column:1/-1; padding-top:2px; }
    .form-status { grid-column:1/-1; min-height:18px; color:var(--red); font-size:12px; }
    article { padding:30px clamp(22px,4vw,68px) 54px; max-width:1100px; }
    .case-title { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; border-bottom:1px solid var(--ink); padding-bottom:20px; }
    h2 { margin:5px 0 0; font:750 clamp(23px,3vw,34px)/1.08 "Segoe UI","Microsoft YaHei","PingFang SC",sans-serif; letter-spacing:-.025em; text-wrap:balance; overflow-wrap:anywhere; }
    .money { color:var(--red); font-size:24px; font-weight:600; white-space:nowrap; }
    .tagline { color:var(--muted); margin:14px 0 22px; }
    .grid { display:grid; grid-template-columns:1.12fr .88fr; gap:16px; }
    .block { border:1px solid var(--line); background:var(--panel); padding:18px; }
    h3 { margin:0 0 13px; font-size:12px; letter-spacing:.09em; text-transform:uppercase; color:var(--teal); }
    dl { display:grid; grid-template-columns:auto 1fr; gap:8px 15px; margin:0; }
    dt { color:var(--muted); } dd { margin:0; font-weight:500; overflow-wrap:anywhere; }
    .recommendation { border-color:#7ca49a; background:#e5f0eb; }
    .recommendation strong { display:block; font:750 24px/1.2 "Segoe UI","Microsoft YaHei","PingFang SC",sans-serif; margin-bottom:8px; }
    .guardrail { margin-top:16px; padding:12px; border:1px dashed var(--orange); background:#fff1d4; font-size:12px; }
    .actions { display:flex; gap:9px; flex-wrap:wrap; margin-top:18px; }
    .action { padding:10px 13px; border:1px solid var(--ink); background:var(--ink); color:#fff; }
    .action.secondary { color:var(--ink); background:transparent; }
    .action.warn { color:#fff; background:var(--red); border-color:var(--red); }
    .action:disabled { cursor:not-allowed; opacity:.45; }
    .status { min-height:20px; color:var(--teal); font-size:12px; margin-top:12px; }
    .review-form { display:grid; grid-template-columns:minmax(180px,.55fr) 1fr; gap:10px; margin-top:18px; }
    .review-form label { display:grid; gap:5px; color:var(--muted); font-size:12px; }
    .review-form label:last-child { grid-column:1/-1; }
    input,textarea,select { width:100%; min-height:44px; border:1px solid var(--line); background:var(--panel); color:var(--ink); padding:9px 10px; font:inherit; }
    input::placeholder,textarea::placeholder { color:var(--muted); opacity:1; }
    textarea { min-height:88px; resize:vertical; }
    .model-panel { margin-top:15px; padding:14px; border:1px solid #d1b967; background:#fff8db; }
    .model-panel[data-status="generated"] { border-color:#7ca49a; background:#e5f0eb; }
    .model-panel[data-status="fallback"],.model-panel[data-status="disabled"] { border-color:#c88b70; }
    .model-meta { color:var(--muted); font-size:11px; margin-top:7px; overflow-wrap:anywhere; }
    .empty { padding:25px 0; color:var(--muted); }
    @media (max-width:800px) { main { grid-template-columns:1fr; } aside { border-right:0; border-bottom:1px solid var(--line); } .grid,.review-form,.builder-form { grid-template-columns:1fr; } .review-form label:last-child,.builder-form .wide { grid-column:auto; } .builder-actions,.form-status { grid-column:auto; } .topbar { align-items:flex-start; flex-direction:column; } .top-actions { justify-items:start; } .top-links { justify-content:flex-start; } }
    @media (prefers-reduced-motion:reduce) { * { scroll-behavior:auto !important; transition:none !important; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div><p class="context-line">模拟数据输入 · 合同规则裁定 · 人工决定 · 资金执行禁用</p><h1>物流结算异常复核台</h1></div>
    <div class="top-actions">
      <div class="mode" id="mode" role="status" aria-live="polite">加载中：将优先尝试本地 API；无 API 时展示仓库内演示案件。</div>
      <nav class="top-links" aria-label="项目链接">
        <a href="settlement_dashboard.html">查看分析看板</a>
        <a href="https://github.com/Martin-cell-blip/logistics-settlement-recon/tree/codex/audit-control-upgrade" target="_blank" rel="noreferrer">查看源码与测试 ↗</a>
      </nav>
    </div>
  </header>
  <main>
    <aside>
      <details class="case-builder" id="case-builder" open>
        <summary>输入模拟数据并运行核验</summary>
        <form class="builder-form" id="case-form">
          <div class="builder-presets" aria-label="异常案例预设">
            <button type="button" data-case-preset="overbilled">多计费</button>
            <button type="button" data-case-preset="duplicate">重复计费</button>
            <button type="button" data-case-preset="notDelivered">未签收</button>
            <button type="button" data-case-preset="match">金额一致</button>
          </div>
          <label class="wide">订单号
            <input id="order-input" required maxlength="40" value="ORDER-SIM-001" placeholder="例如 ORDER-SIM-001">
          </label>
          <label>卖家编号
            <input id="seller-input" required maxlength="40" value="SELLER-TEST" placeholder="例如 SELLER-TEST">
          </label>
          <label>订单状态
            <select id="order-status-input">
              <option value="delivered">已签收</option>
              <option value="not_delivered">未签收</option>
              <option value="missing_order">订单缺失</option>
            </select>
          </label>
          <label>服务区域
            <select id="zone-input">
              <option value="Z1">Z1 · 同城</option>
              <option value="Z2" selected>Z2 · 省内</option>
              <option value="Z3">Z3 · 跨省</option>
            </select>
          </label>
          <label>计费重量
            <input id="weight-input" required type="number" min="0.1" step="0.1" value="5">
          </label>
          <label>合同应付金额
            <input id="contract-input" required type="number" min="0" step="0.01" value="100">
          </label>
          <label>承运商账单金额
            <input id="billed-input" required type="number" min="0" step="0.01" value="125">
          </label>
          <label>账单行数
            <input id="lines-input" required type="number" min="0" max="99" step="1" value="1">
          </label>
          <label>费用明细数
            <input id="items-input" required type="number" min="0" max="99" step="1" value="1">
          </label>
          <label>费率卡版本
            <input id="rate-version-input" required maxlength="40" value="RATE-CARD-2026-Q2">
          </label>
          <label>合同条款
            <input id="clause-input" required maxlength="80" value="§4.2 按计费重量与服务区域结算">
          </label>
          <div class="builder-actions">
            <button class="action" type="submit">运行三方核验</button>
            <button class="action secondary" id="clear-custom" type="button">清空自建案件</button>
          </div>
          <div class="form-status" id="form-status" role="status" aria-live="polite"></div>
        </form>
      </details>
      <div class="meta"><span>待人工决定案件</span><strong id="count">0</strong></div>
      <div class="filters" aria-label="案件优先级筛选"><button class="filter active" data-filter="ALL" aria-pressed="true">全部</button><button class="filter" data-filter="P1" aria-pressed="false">P1</button><button class="filter" data-filter="P2" aria-pressed="false">P2</button><button class="filter" data-filter="P3" aria-pressed="false">P3</button></div>
      <div id="queue"></div>
    </aside>
    <article id="detail"><p class="empty">正在整理案件证据…</p></article>
  </main>
  <script>
    const fallbackUrl = './demo_cases.json';
    const configuredApi = new URLSearchParams(location.search).get('api');
    const CUSTOM_CASES_KEY = 'settlement-custom-cases-v2';
    let cases = [], selected = null, filter = 'ALL', apiBase = configuredApi || '';
    const sessionId = localStorage.getItem('settlement-session') || `session-${crypto.randomUUID()}`;
    localStorage.setItem('settlement-session', sessionId);
    const yuan = new Intl.NumberFormat('zh-CN',{style:'currency',currency:'CNY',maximumFractionDigits:2});
    const esc = value => String(value ?? '未录入').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const newId = prefix => `${prefix}-${crypto.randomUUID()}`;
    const usesApi = caseData => Boolean(apiBase && !caseData?.custom);

    function loadCustomCases() {
      try {
        const parsed = JSON.parse(localStorage.getItem(CUSTOM_CASES_KEY) || '[]');
        return Array.isArray(parsed) ? parsed.filter(item => item?.custom && item?.case_id) : [];
      } catch (_) {
        return [];
      }
    }

    function saveCustomCases() {
      localStorage.setItem(CUSTOM_CASES_KEY, JSON.stringify(cases.filter(item => item.custom)));
    }

    function getSavedDecision(caseId) {
      try {
        return JSON.parse(localStorage.getItem('settlement-' + caseId) || '{}');
      } catch (_) {
        return {};
      }
    }

    function classifyCase({contractExpected, billed, billLines, orderStatus}) {
      const difference = Number((billed - contractExpected).toFixed(2));
      if (orderStatus === 'missing_order') {
        return {recon_status:'MISSING_ORDER', priority:'P1', impact_amount:billed, verdict:'CONFIRMED', recommended_action:'拒付整笔账单', confidence:'HIGH', rationale:'承运商账单存在，但订单主数据缺失，无法建立有效结算依据。'};
      }
      if (orderStatus === 'not_delivered') {
        return {recon_status:'NOT_DELIVERED', priority:'P1', impact_amount:billed, verdict:'CONFIRMED', recommended_action:'暂缓并拒付', confidence:'HIGH', rationale:'订单尚未签收，不满足当前结算节点的付款条件。'};
      }
      if (billed === 0) {
        return {recon_status:'NOT_BILLED', priority:'P3', impact_amount:contractExpected, verdict:'REVIEW', recommended_action:'催承运商确认应付成本', confidence:'MEDIUM', rationale:'合同规则存在应付金额，但承运商账单金额为零。'};
      }
      if (billLines > 1) {
        return {recon_status:'DUPLICATE', priority:'P1', impact_amount:Math.max(difference, billed / billLines), verdict:'CONFIRMED', recommended_action:'拒付重复部分', confidence:'HIGH', rationale:`同一订单出现 ${billLines} 条账单记录，需按订单及运单键核验重复计费。`};
      }
      const threshold = Math.max(Math.abs(contractExpected) * 0.02, 0.01);
      if (difference > threshold) {
        return {recon_status:'OVERBILLED', priority:'P2', impact_amount:difference, verdict:'CONFIRMED', recommended_action:'拒付并追回多计差额', confidence:'HIGH', rationale:`账单金额高于合同应付 ${yuan.format(difference)}，超过 2% 容差。`};
      }
      if (difference < -threshold) {
        return {recon_status:'UNDERBILLED', priority:'P2', impact_amount:difference, verdict:'REVIEW', recommended_action:'人工复核少计成本', confidence:'MEDIUM', rationale:`账单金额低于合同应付 ${yuan.format(Math.abs(difference))}，可能存在漏计或跨期。`};
      }
      return {recon_status:'MATCH', priority:'P3', impact_amount:difference, verdict:'PASS', recommended_action:'金额相符，留痕归档', confidence:'HIGH', rationale:'承运商账单与合同应付差异处于 2% 容差范围内。'};
    }

    function createCustomCase(input) {
      const rule = classifyCase(input);
      const suffix = `${Date.now().toString().slice(-8)}-${crypto.randomUUID().slice(0, 4)}`;
      return {
        case_id:`SIM-${suffix}`,
        custom:true,
        created_at:new Date().toISOString(),
        order_id:input.orderId,
        seller_id:input.sellerId,
        sor_freight:input.contractExpected,
        contract_expected:input.contractExpected,
        billed_total:input.billed,
        policy_version:'browser-contract-rule-v3',
        case_state:'PENDING',
        ...rule,
        evidence:{
          sor_freight:input.contractExpected,
          contract_expected:input.contractExpected,
          rate_card_version:input.rateVersion,
          contract_clause:input.contractClause,
          service_zone:input.serviceZone,
          chargeable_weight_kg:input.chargeableWeight,
          item_count:input.itemCount,
          billed_total:input.billed,
          bill_lines:input.billLines,
          order_status:input.orderStatus,
          customer_delivered_at:input.orderStatus === 'delivered' ? new Date().toISOString() : '未签收',
          rationale:rule.rationale,
          source:'user-simulated-contract-input'
        }
      };
    }

    async function postEvent(eventType, caseId, metadata={}) {
      if (!apiBase) return;
      try {
        await fetch(apiBase + '/events', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({event_type:eventType,case_id:caseId,session_id:sessionId,metadata})
        });
      } catch (_) {}
    }

    async function getCases() {
      const customCases = loadCustomCases();
      if (apiBase) {
        try {
          const r = await fetch(apiBase + '/cases');
          if (!r.ok) throw Error(`HTTP ${r.status}`);
          document.querySelector('#mode').textContent = '混合模式：读取本地 API，也可新建浏览器模拟案件；所有资金操作仍被禁用。';
          return [...customCases, ...await r.json()];
        } catch (error) {
          document.querySelector('#mode').textContent = `API 不可用（${error.message}），已安全降级到脱敏演示数据。`;
          apiBase = '';
        }
      }
      const r = await fetch(fallbackUrl);
      if (!configuredApi) document.querySelector('#mode').textContent = '交互演示：可输入模拟数据并执行规则识别、人工复核与 JSON 留痕；数据仅保存在当前浏览器。';
      return [...customCases, ...await r.json()];
    }

    function restoreDemoState(caseData) {
      if (usesApi(caseData)) return caseData;
      const saved = localStorage.getItem('settlement-' + caseData.case_id);
      if (!saved) return caseData;
      try {
        return {...caseData, case_state:JSON.parse(saved).decision || 'PENDING'};
      } catch (_) {
        return caseData;
      }
    }

    function visible() { return filter === 'ALL' ? cases : cases.filter(c => c.priority === filter); }
    function renderQueue() {
      const items = visible(); document.querySelector('#count').textContent = items.length;
      document.querySelector('#queue').innerHTML = items.map(c => `<button class="case ${selected?.case_id===c.case_id?'active':''}" data-id="${c.case_id}"><div class="case-head"><span>${esc(c.recon_status)}</span><span class="pill ${c.priority==='P1'?'':c.priority.toLowerCase()}">${esc(c.priority)}</span></div><div class="case-foot"><span>${esc(c.case_state || 'PENDING')} · ${esc(c.recommended_action)}</span><strong>${yuan.format(Math.abs(c.impact_amount||0))}</strong></div></button>`).join('') || '<p class="empty">没有符合筛选条件的案件。</p>';
      document.querySelectorAll('.case').forEach(el => el.onclick = () => { selected = cases.find(c => c.case_id === el.dataset.id); renderQueue(); renderDetail(); });
    }

    async function enrich(caseData) {
      if (!usesApi(caseData)) return caseData;
      try { const r = await fetch(apiBase + '/cases/' + encodeURIComponent(caseData.case_id)); return r.ok ? await r.json() : caseData; } catch (_) { return caseData; }
    }

    async function renderDetail() {
      if (!selected) return;
      const current = await enrich(selected);
      selected = current;
      const index = cases.findIndex(c => c.case_id === current.case_id);
      if (index >= 0) cases[index] = current;
      const e = current.evidence || {};
      const pending = (current.case_state || 'PENDING') === 'PENDING';
      const savedDecision = getSavedDecision(current.case_id);
      document.querySelector('#detail').innerHTML = `
        <div class="case-title">
          <div><p class="eyebrow">Case ${esc(current.case_id)} · policy ${esc(current.policy_version || 'controlled-review-v3')}</p><h2>${esc(current.recon_status)} / ${esc(current.recommended_action)}</h2></div>
          <div class="money">${yuan.format(Math.abs(current.impact_amount||0))}</div>
        </div>
        <p class="tagline">订单 ${esc(current.order_id)}　·　卖家 ${esc(current.seller_id)}　·　规则置信度 ${esc(current.confidence)}　·　状态 ${esc(current.case_state || 'PENDING')}</p>
        <div class="grid">
          <section class="block"><h3>Evidence ledger</h3><dl>
             <dt>合同应付金额</dt><dd>${yuan.format(e.contract_expected ?? e.sor_freight ?? current.sor_freight ?? 0)}</dd>
             <dt>费率卡版本</dt><dd>${esc(e.rate_card_version ?? '演示数据未录入')}</dd>
             <dt>合同条款</dt><dd>${esc(e.contract_clause ?? '演示数据未录入')}</dd>
             <dt>服务区域 / 计费重</dt><dd>${esc(e.service_zone ?? '未录入')} / ${esc(e.chargeable_weight_kg ?? '未录入')} kg</dd>
            <dt>费用明细</dt><dd>${esc(e.item_count ?? '未录入')} 条</dd>
            <dt>承运商账单</dt><dd>${yuan.format(e.billed_total ?? current.billed_total ?? 0)} / ${esc(e.bill_lines ?? '未录入')} 条</dd>
            <dt>订单状态</dt><dd>${esc(e.order_status)}</dd>
            <dt>客户签收</dt><dd>${esc(e.customer_delivered_at)}</dd>
            <dt>规则依据</dt><dd>${esc(e.rationale || current.rationale)}</dd>
          </dl></section>
          <section class="block recommendation"><h3>Rule recommendation · source of truth</h3>
            <strong>${esc(current.recommended_action)}</strong><p>${esc(current.rationale)}</p>
            <div class="guardrail">人工审批：必需　/　自动执行：禁用<br>模型只生成证据摘要，不计算金额、不覆盖规则、不调用资金接口。</div>
          </section>
        </div>
        <div class="model-panel" id="model-review" data-status="idle" role="status" aria-live="polite">
          <strong>AI 证据摘要尚未请求</strong>
          <p>点击后按需调用结构化模型；没有密钥或校验失败时会明确回退规则理由。</p>
          <button class="action secondary" id="model-button" ${usesApi(current) ? '' : 'disabled'}>${usesApi(current) ? '生成结构化证据摘要' : '模拟案件使用规则证据摘要'}</button>
        </div>
        <div class="review-form">
          <label>审核人（必填）<input id="reviewer" maxlength="80" minlength="2" required aria-required="true" placeholder="至少 2 个字符" value="${esc(localStorage.getItem('settlement-reviewer') || '')}"></label>
          <label>案件状态<input value="${esc(current.case_state || 'PENDING')}" disabled></label>
          <label>审核备注<textarea id="notes" maxlength="500" placeholder="记录采纳、驳回或升级原因">${esc(savedDecision.notes || '')}</textarea></label>
        </div>
        <div class="actions">
          <button class="action" data-decision="APPROVED" ${pending ? '' : 'disabled'}>采纳建议</button>
          <button class="action secondary" data-decision="REJECTED" ${pending ? '' : 'disabled'}>驳回</button>
          <button class="action warn" data-decision="ESCALATED" ${pending ? '' : 'disabled'}>升级主管复核</button>
          <button class="action secondary" id="export-case" type="button">导出案件与复核轨迹 JSON</button>
        </div>
        <div class="status" id="status" role="status" aria-live="polite">${pending ? '' : `该案件已记录决定：${esc(current.case_state)}`}</div>`;
      document.querySelectorAll('[data-decision]').forEach(button => button.onclick = () => decide(button.dataset.decision));
      document.querySelector('#model-button').onclick = requestModelReview;
      document.querySelector('#export-case').onclick = exportCurrentCase;
      if (usesApi(current)) postEvent('CASE_OPENED', current.case_id, {mode:'api'});
    }

    function renderModelReview(result) {
      const panel = document.querySelector('#model-review');
      const mr = result.model_review;
      const review = mr.review;
      panel.dataset.status = mr.status;
      panel.innerHTML = `<strong>${mr.status === 'generated' ? '模型摘要已通过护栏' : '已安全降级到规则理由'}</strong>
        <p>${esc(review.explanation)}</p>
        <div class="model-meta">状态 ${esc(mr.status)} · provider ${esc(mr.provider)} · model ${esc(mr.model)} · prompt ${esc(mr.prompt_version)} · ${esc(mr.latency_ms)} ms<br>证据引用：${esc(review.evidence_ids.join(', '))}${mr.guardrail_reasons.length ? `<br>回退原因：${esc(mr.guardrail_reasons.join('；'))}` : ''}</div>`;
    }

    async function requestModelReview() {
      if (!usesApi(selected)) return;
      const panel = document.querySelector('#model-review');
      panel.dataset.status = 'loading';
      panel.innerHTML = '<strong>正在生成并校验证据摘要…</strong>';
      const requestKey = `model-request-${selected.case_id}`;
      const requestId = localStorage.getItem(requestKey) || newId('model');
      localStorage.setItem(requestKey, requestId);
      await postEvent('MODEL_REVIEW_REQUESTED', selected.case_id, {});
      try {
        const response = await fetch(apiBase + '/cases/' + encodeURIComponent(selected.case_id) + '/model-review', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({request_id:requestId})
        });
        if (!response.ok) throw Error(`HTTP ${response.status}`);
        renderModelReview(await response.json());
      } catch (error) {
        panel.dataset.status = 'fallback';
        panel.innerHTML = `<strong>模型摘要请求失败</strong><p>${esc(error.message)}；规则建议仍保持有效，未执行任何资金动作。</p>`;
      }
    }

    async function decide(decision) {
      if (!decision) return;
      const reviewer = document.querySelector('#reviewer').value.trim();
      const notes = document.querySelector('#notes').value.trim();
      const status = document.querySelector('#status');
      if (reviewer.length < 2) { status.textContent = '请填写至少 2 个字符的审核人姓名或工号。'; return; }
      localStorage.setItem('settlement-reviewer', reviewer);
      if (usesApi(selected)) {
        const keyName = `decision-request-${selected.case_id}`;
        const idempotencyKey = localStorage.getItem(keyName) || newId('decision');
        localStorage.setItem(keyName, idempotencyKey);
        try {
          const r = await fetch(apiBase + '/cases/' + encodeURIComponent(selected.case_id) + '/human-decision', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({decision,reviewer,notes,idempotency_key:idempotencyKey,expected_state:'PENDING'})
          });
          const body = await r.json();
          if (!r.ok) throw Error(typeof body.detail === 'string' ? body.detail : (body.detail?.message || `HTTP ${r.status}`));
          selected.case_state = body.decision.human_decision;
          await postEvent('DECISION_SUBMITTED', selected.case_id, {decision});
          status.textContent = `已记录：${decision}。系统未执行任何资金操作。`;
          renderQueue();
          setTimeout(renderDetail, 350);
          return;
        } catch (error) {
          status.textContent = `未写入决定：${error.message}`;
          return;
        }
      }
      localStorage.setItem('settlement-' + selected.case_id, JSON.stringify({decision,reviewer,notes}));
      selected.case_state = decision;
      if (selected.custom) saveCustomCases();
      renderQueue();
      await renderDetail();
      document.querySelector('#status').textContent = `演示记录：${decision}。真实模式将写入不可覆盖的人工审批审计记录；系统不会执行资金操作。`;
    }

    function exportCurrentCase() {
      if (!selected) return;
      const payload = {
        export_type:'settlement_reconciliation_audit_trail',
        exported_at:new Date().toISOString(),
        environment:selected.custom ? 'browser_simulation' : (usesApi(selected) ? 'local_api' : 'public_demo'),
        case:selected,
        human_review:getSavedDecision(selected.case_id),
        controls:{
          rule_engine_is_source_of_truth:true,
          human_approval_required:true,
          financial_execution_enabled:false
        },
        disclaimer:'仅用于作品集演示，不包含真实业务数据，不会触发付款或追款。'
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = `${selected.case_id}-audit-trail.json`;
      anchor.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      const status = document.querySelector('#status');
      if (status) status.textContent = '案件与人工复核轨迹 JSON 已生成；文件保存在浏览器下载目录。';
    }

    function applyCasePreset(name) {
      const presets = {
        overbilled:{status:'delivered',contractExpected:100,billed:125,billLines:1,zone:'Z2',weight:5},
        duplicate:{status:'delivered',contractExpected:100,billed:200,billLines:2,zone:'Z2',weight:5},
        notDelivered:{status:'not_delivered',contractExpected:100,billed:100,billLines:1,zone:'Z3',weight:8},
        match:{status:'delivered',contractExpected:100,billed:100,billLines:1,zone:'Z1',weight:2}
      };
      const preset = presets[name];
      if (!preset) return;
      document.querySelector('#order-status-input').value = preset.status;
      document.querySelector('#contract-input').value = preset.contractExpected;
      document.querySelector('#billed-input').value = preset.billed;
      document.querySelector('#lines-input').value = preset.billLines;
      document.querySelector('#zone-input').value = preset.zone;
      document.querySelector('#weight-input').value = preset.weight;
      document.querySelector('#form-status').textContent = '预设已填入，可继续修改后运行三方核验。';
    }

    document.querySelectorAll('[data-case-preset]').forEach(button => {
      button.addEventListener('click', () => applyCasePreset(button.dataset.casePreset));
    });

    document.querySelector('#case-form').addEventListener('submit', async event => {
      event.preventDefault();
      const formStatus = document.querySelector('#form-status');
      const input = {
        orderId:document.querySelector('#order-input').value.trim(),
        sellerId:document.querySelector('#seller-input').value.trim(),
        orderStatus:document.querySelector('#order-status-input').value,
        serviceZone:document.querySelector('#zone-input').value,
        chargeableWeight:Number(document.querySelector('#weight-input').value),
        contractExpected:Number(document.querySelector('#contract-input').value),
        billed:Number(document.querySelector('#billed-input').value),
        billLines:Number(document.querySelector('#lines-input').value),
        itemCount:Number(document.querySelector('#items-input').value),
        rateVersion:document.querySelector('#rate-version-input').value.trim(),
        contractClause:document.querySelector('#clause-input').value.trim()
      };
      if (!input.orderId || !input.sellerId || !input.rateVersion || !input.contractClause) {
        formStatus.textContent = '请填写订单、卖家、费率卡版本和合同条款。';
        return;
      }
      if (![input.contractExpected,input.billed,input.billLines,input.itemCount,input.chargeableWeight].every(Number.isFinite) || input.contractExpected < 0 || input.billed < 0 || input.billLines < 0 || input.itemCount < 0 || input.chargeableWeight <= 0) {
        formStatus.textContent = '金额、行数和计费重量必须是有效数字；计费重量需大于零。';
        return;
      }
      const created = createCustomCase(input);
      cases.unshift(created);
      selected = created;
      filter = 'ALL';
      document.querySelectorAll('.filter').forEach(button => {
        const active = button.dataset.filter === 'ALL';
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
      saveCustomCases();
      renderQueue();
      await renderDetail();
      formStatus.textContent = `核验完成：${created.recon_status}，已按 ${created.priority} 优先级进入复核队列。`;
      document.querySelector('#case-builder').open = false;
    });

    document.querySelector('#clear-custom').addEventListener('click', async () => {
      const customIds = cases.filter(item => item.custom).map(item => item.case_id);
      customIds.forEach(id => localStorage.removeItem('settlement-' + id));
      cases = cases.filter(item => !item.custom);
      localStorage.removeItem(CUSTOM_CASES_KEY);
      filter = 'ALL';
      document.querySelectorAll('.filter').forEach(button => {
        const active = button.dataset.filter === 'ALL';
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
      selected = cases[0] || null;
      document.querySelector('#form-status').textContent = '已清空当前浏览器中的自建案件。';
      renderQueue();
      if (selected) await renderDetail();
    });

    document.querySelectorAll('.filter').forEach(button => button.onclick = () => {
      filter=button.dataset.filter;
      document.querySelectorAll('.filter').forEach(x => {
        const active = x === button;
        x.classList.toggle('active',active);
        x.setAttribute('aria-pressed', String(active));
      });
      const items=visible(); selected=items[0]||null; renderQueue(); renderDetail();
    });
    (async () => { cases = (await getCases()).map(restoreDemoState); selected = cases[0] || null; renderQueue(); renderDetail(); })();
  </script>
</body>
</html>
